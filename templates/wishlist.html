{% extends "base.html" %}
{% block title %}Wishlist – CampusMart{% endblock %}

{% block content %}
<div style="padding:32px 0 60px;">

    <div class="section-header">
      <div>
        <h1 class="section-title">🤍 My Wishlist</h1>
        <p class="section-subtitle" id="wishlist-count">Loading…</p>

{% block extra_js %}

{% endblock %}
